<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Sudip ❤️ Srijita | Our Story</title>

  <!-- SEO -->
  <meta name="description" content="A beautiful love story ❤️">

  <!-- Open Graph -->
  <meta property="og:title" content="Sudip ❤️ Srijita">
  <meta property="og:image" content="assets/images/preview.jpg">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading Our Story...</div>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop class="video-bg">
  <source src="assets/video/m.mp4" type="video/mp4">
</video>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="assets/music/music.mp3" type="audio/mp3">
</audio>

<div class="music" onclick="toggleMusic()">🎵</div>

<!-- HERO -->
<section class="hero">
  <div class="glass">
    <h1>Sudip ❤️ Srijita</h1>
    <p>A Love Written Beyond Time</p>

    <!-- PASSWORD -->
    <div class="secret-box">
      <input type="password" id="pass" placeholder="Enter secret..." />
      <button onclick="unlock()">Unlock</button>
    </div>

    <!-- HIDDEN CONTENT -->
    <div id="hidden">
      <h2>💌 My Love</h2>
      <p id="typeText"></p>

      <div class="timer" id="timer"></div>

      <button onclick="shareLove()">Memories ❤️</button>
    </div>
  </div>
</section>

<script src="js/app.js"></script>
</body>
</html>
