<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Our Memories ❤️</title>

  <link rel="stylesheet" href="css/styles.css">

  <style>
    body {
      background: black;
      color: white;
    }

    .memories-container {
      padding: 80px 20px;
      text-align: center;
    }

    .title {
      font-size: 2.5rem;
      margin-bottom: 50px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      transition: 0.5s;
    }

    .card:hover img {
      transform: scale(1.1);
      filter: brightness(60%);
    }

    .caption {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      opacity: 0;
      transition: 0.5s;
    }

    .card:hover .caption {
      opacity: 1;
    }

    /* Fade-in animation */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: 1s;
    }

    .fade-in.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Back button */
    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      background: linear-gradient(45deg, #ff4d6d, #ff758c);
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<section class="memories-container">
  <h1 class="title">Our Beautiful Memories ❤️</h1>

  <div class="grid">

    <!-- MEMORY 1 -->
    <div class="card fade-in">
      <img src="assets/images/g1.jpg" loading="lazy">
      <div class="caption">Our first trip together 🌍</div>
    </div>

    <!-- MEMORY 2 -->
    <div class="card fade-in">
      <img src="assets/images/g2.jpg" loading="lazy">
      <div class="caption">One of the day you made me smile 😊</div>
    </div>

    <!-- MEMORY 3 -->
    <div class="card fade-in">
      <img src="assets/images/g5.jpg" loading="lazy">
      <div class="caption">Swaraswati Puja </div>
    </div>

    <!-- MEMORY 4 -->
    <div class="card fade-in">
      <img src="assets/images/g6.jpg" loading="lazy">
      <div class="caption">That unforgettable moment ✨</div>
    </div>

    <!-- MEMORY 5 -->
    <div class="card fade-in">
      <img src="assets/images/g4.jpg" loading="lazy">
      <div class="caption">The never-ending love 🌙</div>
    </div>

    <!-- MEMORY 6 -->
    <div class="card fade-in">
      <img src="assets/images/g3.jpg" loading="lazy">
      <div class="caption">Forever starts here 💍</div>
    </div>

  </div>
</section>

<script>
// SCROLL ANIMATION
const elements = document.querySelectorAll(".fade-in");

function showOnScroll() {
  const triggerBottom = window.innerHeight * 0.85;

  elements.forEach(el => {
    const boxTop = el.getBoundingClientRect().top;

    if (boxTop < triggerBottom) {
      el.classList.add("show");
    }
  });
}

window.addEventListener("scroll", showOnScroll);
showOnScroll();
</script>

</body>
</html>
